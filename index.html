<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El universo de Panchi Tapia 🐱🐾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFF8E7;
            --pink: #FFB5C2;
            --mint: #B5EAD7;
            --lavender: #C7CEEA;
            --peach: #FFDAB9;
            --coffee: #8B6F47;
            --dark: #4A4A4A;
            --white: #FFFFFF;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--peach) 100%);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating cats decoration */
        body::before {
            content: '🐱';
            position: fixed;
            font-size: 3rem;
            top: 10%;
            right: 5%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '☕';
            position: fixed;
            font-size: 2.5rem;
            bottom: 15%;
            left: 8%;
            opacity: 0.3;
            animation: float 5s ease-in-out infinite 1s;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 4rem;
            background: linear-gradient(135deg, var(--pink), var(--lavender), var(--mint));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 20px rgba(255, 181, 194, 0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--coffee);
            font-weight: 500;
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab {
            padding: 1rem 2rem;
            background: var(--white);
            border: 3px solid var(--pink);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0px var(--pink);
            position: relative;
            overflow: hidden;
        }

        .tab:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--pink);
        }

        .tab.active {
            background: var(--pink);
            color: var(--white);
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--pink);
        }

        /* Content Sections */
        .section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: var(--white);
            border-radius: 25px;
            padding: 2rem;
            box-shadow: 0 10px 30px var(--shadow);
            margin-bottom: 2rem;
            border: 3px solid var(--mint);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--mint) 0%, transparent 70%);
            opacity: 0.1;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .card-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--coffee);
        }

        .card-icon {
            font-size: 2.5rem;
        }

        /* Notes Section */
        .note-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--lavender);
            border-radius: 15px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 1rem;
            background: var(--cream);
        }

        .note-input:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: 0 0 0 3px rgba(255, 181, 194, 0.2);
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink), var(--lavender));
            color: var(--white);
        }

        .btn-secondary {
            background: var(--mint);
            color: var(--dark);
        }

        .btn-danger {
            background: #FF6B6B;
            color: var(--white);
        }

        /* Notes List */
        .notes-list {
            display: grid;
            gap: 1rem;
        }

        .note-item {
            background: var(--cream);
            padding: 1.5rem;
            border-radius: 15px;
            border-left: 5px solid var(--pink);
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .note-content {
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .note-date {
            font-size: 0.85rem;
            color: var(--coffee);
            opacity: 0.7;
        }

        .note-delete {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .note-delete:hover {
            opacity: 1;
        }

        /* Calendar Section */
        .calendar-input-group {
            display: grid;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .input-field {
            padding: 1rem;
            border: 2px solid var(--lavender);
            border-radius: 15px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            background: var(--cream);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: 0 0 0 3px rgba(255, 181, 194, 0.2);
        }

        .events-list {
            display: grid;
            gap: 1rem;
        }

        .event-item {
            background: linear-gradient(135deg, var(--lavender), var(--mint));
            padding: 1.5rem;
            border-radius: 20px;
            color: var(--white);
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        .event-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .event-date {
            font-size: 1rem;
            opacity: 0.9;
        }

        .event-delete {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            padding: 0.5rem;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .event-delete:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: rotate(90deg);
        }

        /* Pills Section */
        .pills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .pill-item {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 20px;
            border: 3px solid var(--peach);
            position: relative;
            transition: transform 0.3s;
        }

        .pill-item:hover {
            transform: translateY(-5px);
        }

        .pill-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--coffee);
            margin-bottom: 0.5rem;
        }

        .pill-schedule {
            color: var(--dark);
            margin-bottom: 0.3rem;
        }

        .pill-delete {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            opacity: 0.5;
        }

        .pill-delete:hover {
            opacity: 1;
        }

        /* Birthdays Section */
        .birthdays-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .birthday-item {
            background: linear-gradient(135deg, var(--pink), var(--peach));
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            color: var(--white);
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        .birthday-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .birthday-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .birthday-date {
            font-size: 1rem;
            opacity: 0.9;
        }

        .birthday-delete {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            padding: 0.5rem;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .birthday-delete:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--coffee);
            opacity: 0.6;
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .tabs {
                gap: 0.5rem;
            }

            .tab {
                padding: 0.8rem 1.5rem;
                font-size: 0.95rem;
            }

            .card {
                padding: 1.5rem;
            }

            .pills-grid,
            .birthdays-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Fun decorative elements */
        .sparkle {
            display: inline-block;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ El universo de Panchi Tapia 🐱🐾</h1>
            <p class="subtitle">Un rincón especial inspirado en Harry, gatos y café ☕</p>
        </header>

        <nav class="tabs">
            <button class="tab active" onclick="switchTab('notes')">📝 Notas</button>
            <button class="tab" onclick="switchTab('calendar')">📅 Calendario</button>
            <button class="tab" onclick="switchTab('pills')">💊 Pastillero</button>
            <button class="tab" onclick="switchTab('birthdays')">🎂 Cumpleaños</button>
        </nav>

        <!-- Notes Section -->
        <div id="notes" class="section active">
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">📝</span>
                    <h2 class="card-title">Mis Notas</h2>
                </div>
                <textarea 
                    id="noteInput" 
                    class="note-input" 
                    placeholder="Escribe tus pensamientos aquí... ✨"></textarea>
                <button class="btn btn-primary" onclick="addNote()">💫 Guardar Nota</button>
                <div id="notesList" class="notes-list"></div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div id="calendar" class="section">
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">📅</span>
                    <h2 class="card-title">Fechas Importantes</h2>
                </div>
                <div class="calendar-input-group">
                    <input 
                        type="text" 
                        id="eventTitle" 
                        class="input-field" 
                        placeholder="¿Qué evento? 🎪">
                    <input 
                        type="date" 
                        id="eventDate" 
                        class="input-field">
                    <button class="btn btn-primary" onclick="addEvent()">✨ Agregar Evento</button>
                </div>
                <div id="eventsList" class="events-list"></div>
            </div>
        </div>

        <!-- Pills Section -->
        <div id="pills" class="section">
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">💊</span>
                    <h2 class="card-title">Mi Pastillero</h2>
                </div>
                <div class="form-grid">
                    <input 
                        type="text" 
                        id="pillName" 
                        class="input-field" 
                        placeholder="Nombre del medicamento">
                    <input 
                        type="text" 
                        id="pillDose" 
                        class="input-field" 
                        placeholder="Dosis (ej: 1 tableta)">
                    <input 
                        type="text" 
                        id="pillTime" 
                        class="input-field" 
                        placeholder="Horario (ej: 8:00 AM)">
                </div>
                <button class="btn btn-primary" onclick="addPill()">💊 Agregar Medicamento</button>
                <div id="pillsList" class="pills-grid"></div>
            </div>
        </div>

        <!-- Birthdays Section -->
        <div id="birthdays" class="section">
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🎂</span>
                    <h2 class="card-title">Cumpleaños</h2>
                </div>
                <div class="form-grid">
                    <input 
                        type="text" 
                        id="birthdayName" 
                        class="input-field" 
                        placeholder="Nombre">
                    <input 
                        type="date" 
                        id="birthdayDate" 
                        class="input-field">
                </div>
                <button class="btn btn-primary" onclick="addBirthday()">🎉 Agregar Cumpleaños</button>
                <div id="birthdaysList" class="birthdays-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // Tab Switching
        function switchTab(tabName) {
            // Hide all sections
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            
            // Remove active from all tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected section
            document.getElementById(tabName).classList.add('active');
            
            // Mark tab as active
            event.target.classList.add('active');
        }

        // Notes Management
        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem('notes') || '[]');
            const notesList = document.getElementById('notesList');
            
            if (notes.length === 0) {
                notesList.innerHTML = '<div class="empty-state">No hay notas aún. ¡Escribe tu primera nota! 🐱</div>';
                return;
            }
            
            notesList.innerHTML = notes.map((note, index) => `
                <div class="note-item">
                    <button class="note-delete" onclick="deleteNote(${index})">🗑️</button>
                    <div class="note-content">${note.content}</div>
                    <div class="note-date">${note.date}</div>
                </div>
            `).join('');
        }

        function addNote() {
            const input = document.getElementById('noteInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            const notes = JSON.parse(localStorage.getItem('notes') || '[]');
            notes.unshift({
                content: content,
                date: new Date().toLocaleDateString('es-ES', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            });
            
            localStorage.setItem('notes', JSON.stringify(notes));
            input.value = '';
            loadNotes();
        }

        function deleteNote(index) {
            const notes = JSON.parse(localStorage.getItem('notes') || '[]');
            notes.splice(index, 1);
            localStorage.setItem('notes', JSON.stringify(notes));
            loadNotes();
        }

        // Calendar Management
        function loadEvents() {
            const events = JSON.parse(localStorage.getItem('events') || '[]');
            const eventsList = document.getElementById('eventsList');
            
            if (events.length === 0) {
                eventsList.innerHTML = '<div class="empty-state">No hay eventos programados. ¡Agrega uno! 📅</div>';
                return;
            }
            
            // Sort events by date
            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            eventsList.innerHTML = events.map((event, index) => `
                <div class="event-item">
                    <button class="event-delete" onclick="deleteEvent(${index})">✕</button>
                    <div class="event-title">${event.title}</div>
                    <div class="event-date">${formatDate(event.date)}</div>
                </div>
            `).join('');
        }

        function addEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const date = document.getElementById('eventDate').value;
            
            if (!title || !date) return;
            
            const events = JSON.parse(localStorage.getItem('events') || '[]');
            events.push({ title, date });
            
            localStorage.setItem('events', JSON.stringify(events));
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDate').value = '';
            loadEvents();
        }

        function deleteEvent(index) {
            const events = JSON.parse(localStorage.getItem('events') || '[]');
            events.splice(index, 1);
            localStorage.setItem('events', JSON.stringify(events));
            loadEvents();
        }

        // Pills Management
        function loadPills() {
            const pills = JSON.parse(localStorage.getItem('pills') || '[]');
            const pillsList = document.getElementById('pillsList');
            
            if (pills.length === 0) {
                pillsList.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">No hay medicamentos registrados. 💊</div>';
                return;
            }
            
            pillsList.innerHTML = pills.map((pill, index) => `
                <div class="pill-item">
                    <button class="pill-delete" onclick="deletePill(${index})">✕</button>
                    <div class="pill-name">💊 ${pill.name}</div>
                    <div class="pill-schedule">📋 ${pill.dose}</div>
                    <div class="pill-schedule">⏰ ${pill.time}</div>
                </div>
            `).join('');
        }

        function addPill() {
            const name = document.getElementById('pillName').value.trim();
            const dose = document.getElementById('pillDose').value.trim();
            const time = document.getElementById('pillTime').value.trim();
            
            if (!name || !dose || !time) return;
            
            const pills = JSON.parse(localStorage.getItem('pills') || '[]');
            pills.push({ name, dose, time });
            
            localStorage.setItem('pills', JSON.stringify(pills));
            document.getElementById('pillName').value = '';
            document.getElementById('pillDose').value = '';
            document.getElementById('pillTime').value = '';
            loadPills();
        }

        function deletePill(index) {
            const pills = JSON.parse(localStorage.getItem('pills') || '[]');
            pills.splice(index, 1);
            localStorage.setItem('pills', JSON.stringify(pills));
            loadPills();
        }

        // Birthdays Management
        function loadBirthdays() {
            const birthdays = JSON.parse(localStorage.getItem('birthdays') || '[]');
            const birthdaysList = document.getElementById('birthdaysList');
            
            if (birthdays.length === 0) {
                birthdaysList.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">No hay cumpleaños registrados. 🎂</div>';
                return;
            }
            
            // Sort birthdays by date
            birthdays.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return dateA.getMonth() - dateB.getMonth() || dateA.getDate() - dateB.getDate();
            });
            
            birthdaysList.innerHTML = birthdays.map((birthday, index) => `
                <div class="birthday-item">
                    <button class="birthday-delete" onclick="deleteBirthday(${index})">✕</button>
                    <div class="birthday-emoji">🎉</div>
                    <div class="birthday-name">${birthday.name}</div>
                    <div class="birthday-date">${formatDate(birthday.date)}</div>
                </div>
            `).join('');
        }

        function addBirthday() {
            const name = document.getElementById('birthdayName').value.trim();
            const date = document.getElementById('birthdayDate').value;
            
            if (!name || !date) return;
            
            const birthdays = JSON.parse(localStorage.getItem('birthdays') || '[]');
            birthdays.push({ name, date });
            
            localStorage.setItem('birthdays', JSON.stringify(birthdays));
            document.getElementById('birthdayName').value = '';
            document.getElementById('birthdayDate').value = '';
            loadBirthdays();
        }

        function deleteBirthday(index) {
            const birthdays = JSON.parse(localStorage.getItem('birthdays') || '[]');
            birthdays.splice(index, 1);
            localStorage.setItem('birthdays', JSON.stringify(birthdays));
            loadBirthdays();
        }

        // Utility Functions
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('es-ES', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            loadNotes();
            loadEvents();
            loadPills();
            loadBirthdays();
        });

        // Add note with Enter key (Ctrl+Enter for newline)
        document.getElementById('noteInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                addNote();
            }
        });
    </script>
</body>
</html>
